name: go
build-base: ubuntu@26.04
base: bare
version: '1.25'
summary: The Go programming language
description: |
  Go is an open source programming language that enables the production of
  simple, efficient and reliable software at scale.
platforms: 
  amd64:
  arm64:
license: null

# We are not using the _daemon_ run-user, since rockcraft adds this user
# locked. We however needs sudo to run apt.
# https://github.com/canonical/rockcraft/blob/acc25f85af3ec691eb7f9f41558164745c03e028/rockcraft/oci.py#L297

# TODO: Investigate and change GOTOOLCHAIN to "local+auto"
environment:
  GOTOOLCHAIN: local

parts:
  golang:
    plugin: nil
    stage-packages:
      - apt_apt-get
      - base-files_base
      - base-files_chisel
      - base-files_release-info
      - base-passwd_data
      - bash_bins
      - ca-certificates_data
      - coreutils_bins
      - debianutils_which
      - findutils_bins
      # Manually point to golang-1.25 as the package golang now points to golang-1.26 as of May 27, 2026.
      - golang-1.25_cgo-support
      - grep_bins
      - gzip_bins
      - tar_bins
      - wget_bins
      - zstd_bins

    override-build: |
      craftctl default

      # Remove the unnecessary test files
      # Ref: https://github.com/canonical/chisel-releases/blob/ubuntu-24.04/slices/golang-1.22-src.yaml#L12
      find ${CRAFT_PART_INSTALL} -depth \( \
        \( -path '*test*' \
           ! -path '*src/testing*' \
           ! -path '*src/internal/test*' \
           ! -path '*src/internal/synctest' \
           ! -path '*synctest.go' \
           ! -path '*synctest_o*' \) -o \
        \( -path '*/testing/*' -name '*_test.go' \) \
        \) -exec rm -rf {} +

      # Manually set up the symlinks used to be provided by golang-go=1.25
      ln -s "../lib/go-1.25/bin/go" ${CRAFT_PART_INSTALL}/usr/bin/go
      ln -s "../lib/go-1.25/bin/gofmt" ${CRAFT_PART_INSTALL}/usr/bin/gofmt
      ln -s "../share/go-1.25" ${CRAFT_PART_INSTALL}/usr/lib/go

  deb-security-manifest:
    plugin: make
    source: https://github.com/canonical/rocks-security-manifest
    source-type: git
    source-branch: main
    override-prime: gen_manifest
